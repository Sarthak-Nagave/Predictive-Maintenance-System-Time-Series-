<!DOCTYPE html>
<html>
<head>
    <title>Predictive Maintenance System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- HEADER -->
<header class="main-header">
    <div class="header-left">
        <i class="fa-solid fa-industry"></i>
        <h1>Predictive Maintenance System</h1>
    </div>

    <div class="header-right">
        <div class="live-indicator">
            <span class="live-dot"></span>
            LIVE MONITORING
        </div>

        <button id="darkToggle" class="dark-toggle">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>
</header>

<!-- MAIN CONTENT -->
<div class="main-container">

    <!-- CONTROL PANEL -->
    <div class="card control-card">
        <input type="number" id="engineId" placeholder="Enter Engine ID">

        <select id="sensorSelect">
            <option value="sensor_2">Sensor 2</option>
            <option value="sensor_3">Sensor 3</option>
            <option value="sensor_4">Sensor 4</option>
            <option value="sensor_7">Sensor 7</option>
            <option value="sensor_11">Sensor 11</option>
        </select>

        <button onclick="startAnalysis()">
            <i class="fa-solid fa-magnifying-glass"></i> Analyze
        </button>

        <button onclick="downloadReport()">
            <i class="fa-solid fa-file-pdf"></i> Export PDF
        </button>
    </div>

    <!-- STATUS + GAUGE -->
    <div class="card result-card">

        <div class="status-section">
            <h2>Status</h2>
            <div id="statusText">Awaiting Prediction...</div>
            <div id="probability"></div>
            <div id="riskBadge" class="risk-badge"></div>
        </div>

        <div class="gauge-section">
            <div class="meter-container">
                <canvas id="gaugeChart"></canvas>
                <div id="gaugeValue">0%</div>
            </div>
        </div>

    </div>

    <!-- TREND GRAPH -->
    <div class="card trend-card">
        <h2>
            <i class="fa-solid fa-chart-line"></i>
            Sensor Trend Analysis
        </h2>
        <canvas id="trendChart"></canvas>
    </div>

    <!-- LOADING BAR -->
    <div id="loadingSkeleton" class="loading-skeleton"></div>

</div>

<!-- FOOTER -->
<footer class="footer">
    <p>
        © 2026 Predictive Maintenance System | Developed by <strong>Team 2</strong> | Thynk Tech India
    </p>
</footer>

<script src="/static/script.js"></script>

</body>
</html>
